# This file is a template, and might need editing before it works on your project.
# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml

# This is a sample GitLab CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages

stages:          # List of stages for jobs, and their order of execution
  - build
  - deploy
  - upload

workflow:        # Run this workflow when a tag is pushed
  rules:
    - if: $CI_COMMIT_TAG

variables:
  ZIP_FILE_NAME: "warlock-$CI_COMMIT_TAG.zip"
  RELEASE_DOWNLOAD: "https://gitlab.com/$CI_PROJECT_PATH/-/releases/$CI_COMMIT_TAG/downloads/warlock-$CI_COMMIT_TAG.zip"

build:       # This job runs in the build stage, which runs first.
  stage: build
  script:
    - echo "Building..."
    - apt-get update
    - apt-get install -y zip
    - zip $ZIP_FILE_NAME -r lang module styles templates system.json template.json LICENSE.txt
  artifacts:     # Include the system.json and created zip file as artifacts of the job.
    paths:
      - $ZIP_FILE_NAME
      - system.json
    expire_in: never

deploy:      # This job runs in the deploy stage.
  stage: deploy  # It only runs when *both* jobs in the test stage complete successfully.
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Deploying..."
  release:
    tag_name: '$CI_COMMIT_TAG'
    ref: '$CI_COMMIT_TAG'
    description: '**Installation:** To manually install this release, please use the following manifest URL: https://gitlab.com/$CI_PROJECT_PATH/-/releases/$CI_COMMIT_TAG/downloads/system.json'
    assets:
      links:
        # Link the release to the system manifest from this CI workflow.
        - name: 'system.json'
          url: https://gitlab.com/$CI_PROJECT_PATH/-/jobs/artifacts/$CI_COMMIT_TAG/raw/system.json?job=build
          filepath: '/system.json'
        # Link the release to the zip file from this CI workflow.
        - name: '$ZIP_FILE_NAME'
          url: https://gitlab.com/$CI_PROJECT_PATH/-/jobs/artifacts/$CI_COMMIT_TAG/raw/$ZIP_FILE_NAME?job=build
          filepath: '/$ZIP_FILE_NAME'

upload:
  stage: upload
  image: curlimages/curl:latest
  script: |
    curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file system.json "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/fvtt-warlock/latest/system.json"